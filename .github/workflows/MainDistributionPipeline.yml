#
# This workflow calls the main distribution pipeline from DuckDB to build, test and (optionally) release the extension
#
name: Main Extension Distribution Pipeline
on:
  pull_request:
  push:
    branches:
      - main
      - dev
    paths:
      - .github/workflows/MainDistributionPipeline.yml
      - duckdb/**
      - extension-ci-tools/**
      - src/**
      - test/**
      - CMakelists.txt
      - extension_config.cmake
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' && github.sha || '' }}
  cancel-in-progress: true

jobs:
  duckdb-stable-build:
    name: Build extension binaries
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5.0
    with:
      duckdb_version: v1.5.0
      ci_tools_version: v1.5.0
      extension_name: flock
      # Exclude everything except windows_amd64_mingw for testing
      exclude_archs: 'linux_amd64;linux_amd64_gcc4;linux_arm64;osx_amd64;osx_arm64;windows_amd64;wasm_mvp;wasm_eh;wasm_threads'
