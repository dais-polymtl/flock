name: Website Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/WebsiteDeploy.yaml
      - docs/**
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Mintlify site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Mintlify CLI
        run: npm install -g mint

      - name: Export static site
        working-directory: docs
        run: mint export --output ../docs-site.zip

      - name: Prepare GitHub Pages artifact
        run: |
          mkdir -p docs-site
          unzip -q docs-site.zip -d docs-site
          node docs/scripts/prepare-github-pages.mjs docs-site
          npx -y pagefind --site docs-site --output-subdir pagefind

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
