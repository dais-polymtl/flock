repos:
  # Pin clang-format to v11 to match CI (duckdb/extension-ci-tools installs
  # clang-format-11 / clang_format==11.0.1 in _extension_code_quality.yml).
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v11.0.1
    hooks:
      - id: clang-format
        types_or: [c, c++, cuda]  # Correctly specify file types

  - repo: https://github.com/cheshirekow/cmake-format-precommit
    rev: v0.6.13
    hooks:
    - id: cmake-format
      entry: cmake-format
      types: [cmake]
